name: deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Setup PHP
        uses: shivammathur/setup-php@a919ff576a94b0fd7ec15f090dd9cf16b76c2c0b
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f public/build/manifest.json
          ls -la public/build

      - name: Upload application files
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "app,bootstrap,config,database,public,public/build,resources,routes,artisan,composer.json,composer.lock"
          target: ${{ secrets.HOSTINGER_PATH }}
          rm: false
          strip_components: 0
          overwrite: true

      - name: Run deployment commands
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script_stop: true
          script: |
            cd "${{ secrets.HOSTINGER_PATH }}"
            mkdir -p storage/framework/cache
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            mkdir -p bootstrap/cache
            if [ ! -f public/build/manifest.json ]; then
              echo "Missing public/build/manifest.json after upload."
              ls -la public || true
              exit 1
            fi
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan optimize:clear --except=cache --no-interaction
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
